<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY LOCKER — Premium Chow Chow Kennel</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* СТРАХОВКА: Темный фон, пока грузится картинка */
            background-color: #1a1a1a; 
        }

        .hero-bg {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* СТРАХОВКА + ФОТО */
            background: #1a1a1a url('bg-hero.jpg') no-repeat center center;
            background-size: cover;
            font-family: "Georgia", "Times New Roman", serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .content-overlay {
            background: transparent; 
            padding: 20px;
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        .brand-name {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.9);
        }

        .breed-name {
            font-size: 1.3rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin: 10px 0 30px 0;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .gold-divider {
            width: 50px;
            height: 2px;
            background-color: #d4af37;
            margin: 0 auto 30px auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .legend-text {
            margin: 12px 0;
            font-style: italic;
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9), 0 1px 2px rgba(0, 0, 0, 1);
        }

        .legend-cn {
            font-style: normal;
            font-size: 1.4rem;
            color: #ffffff;
            margin-top: 25px;
            letter-spacing: 0.1em;
            font-family: "STSong", "SimSun", "Songti SC", serif;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9), 0 1px 2px rgba(0, 0, 0, 1);
        }

        nav {
            margin-top: 40px;
        }

        nav a {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 10px 15px;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            transition: color 0.3s;
        }

        nav a:hover {
            color: #d4af37;
        }

        @media (max-width: 600px) {
            .content-overlay {
                padding: 10px;
            }
            nav a { 
                display: block; 
                margin: 15px 0; 
            }
        }
    </style>
</head>
<body>
    
    <div class="hero-bg">
        <div class="content-overlay">
            <h1 class="brand-name">SKY LOCKER</h1>
            <p class="breed-name">Chow Chow</p>
            
            <div class="gold-divider"></div>

            <div class="legend-box">
                <p class="legend-text">Легенда, коснувшаяся неба: Древние стражи с лазурным сердцем.</p>
                <p class="legend-text">A legend that touched the sky: Ancient guardians with an azure heart.</p>
                <p class="legend-cn">触碰天空的传奇：拥有蔚蓝之心的远古守护者。</p>
            </div>

            <nav>
                <a href="#">Main</a>
                <a href="#">About</a>
                <a href="#">Our Dogs</a>
                <a href="#">Puppies</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </div>

</body>
</html>
