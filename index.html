<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY LOCKER — Premium Chow Chow Kennel</title>
    <style>
        :root {
            --gold: #b8860b;
            --text-dark: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            /* Основной шрифт для всего мира и Китая */
            font-family: "Georgia", "Times New Roman", serif;
            background-color: #fffdfa;
            color: var(--text-dark);
        }

        /* ВЕРХНЯЯ ЧАСТЬ С ФОНОМ */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Путь к вашему загруженному фото */
            background: url('bg-hero.jpg') no-repeat center center;
            background-size: cover;
            text-align: center;
            padding: 20px;
        }

        /* ПОЛУПРОЗРАЧНЫЙ БЛОК ДЛЯ ТЕКСТА (Эффект дорогого стекла) */
        .content-overlay {
            background: rgba(255, 253, 250, 0.85); /* Кремовый фон с прозрачностью */
            backdrop-filter: blur(10px); /* Размытие фона за текстом - очень современно */
            padding: 50px 30px;
            border-radius: 2px;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(184, 134, 11, 0.2);
        }

        .brand-name {
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin: 0;
            line-height: 1.2;
        }

        .breed-name {
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin: 15px 0 30px 0;
            font-weight: 300;
        }

        .divider {
            width: 50px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 30px auto;
        }

        .legend-text {
            font-style: italic;
            font-size: 1.1rem;
            color: #444;
            margin: 10px 0;
            line-height: 1.6;
        }

        .legend-cn {
            font-style: normal;
            font-size: 1.3rem;
            margin-top: 20px;
            letter-spacing: 0.1em;
            /* Безопасные китайские шрифты для КНР */
            font-family: "STSong", "SimSun", "Songti SC", serif;
        }

        /* НАВИГАЦИЯ */
        nav {
            margin-top: 40px;
        }

        nav a {
            display: inline-block;
            margin: 10px 15px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--gold);
        }

        @media (max-width: 600px) {
            .content-overlay { padding: 30px 15px; }
            nav a { display: block; margin: 10px 0; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="content-overlay">
            <h1 class="brand-name">SKY LOCKER</h1>
            <p class="breed-name">Chow Chow</p>
            
            <div class="divider"></div>

            <p class="legend-text">Легенда, коснувшаяся неба: Древние стражи с лазурным сердцем.</p>
            <p class="legend-text">A legend that touched the sky: Ancient guardians with an azure heart.</p>
            <p class="legend-cn">触碰天空的传奇：拥有蔚蓝之心的远古守护者。</p>

            <nav>
                <a href="#main">Main</a>
                <a href="#about">About</a>
                <a href="#dogs">Our Dogs</a>
                <a href="#puppies">Puppies</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </section>

</body>
</html>
