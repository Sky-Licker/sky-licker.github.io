            height: 100%;

        body {
            /* Ваше фото на весь экран */
            background: url('bg-hero.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: "Georgia", "Times New Roman", serif;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* КОНТЕЙНЕР ДЛЯ ВСЕГО САЙТА */
        .page-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Легкий градиент поверх фото, чтобы текст был четким, а фото ярким */
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%);
        }

        /* ПРОЗРАЧНЫЙ ТЕКСТОВЫЙ БЛОК */
        .content-overlay {
            /* Убираем плотный цвет, оставляем легкую дымку */
            background-color: rgba(255, 253, 250, 0.15); 
            backdrop-filter: blur(8px); /* Размытие фона делает текст читаемым, но не прячет фото */
            -webkit-backdrop-filter: blur(8px);
            
            padding: 40px 20px;
            border-radius: 2px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            
            /* Тонкая, почти незаметная золотая кайма для стиля "люкс" */
            border: 1px solid rgba(184, 134, 11, 0.3);
        }

            margin: 0;
            line-height: 1.1;

            font-weight: bold;

            margin: 0 auto 30px auto;
