<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY LOCKER - Premium Chow Chow Kennel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            /* Темный фон по умолчанию, чтобы текст был виден, если фото пропадет */
            background-color: #1a1a1a; 
            font-family: "Playfair Display", serif;
            color: #1a1a1a;
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Проверьте название файла ниже! Оно должно быть точно таким на GitHub */
            background: #1a1a1a url('hero-bg.png') no-repeat center center;
            background-size: cover;
        }

        .hero-overlay {
            position: relative;
            z-index: 2;
            /* Светлая подложка с размытием */
            background: rgba(255, 255, 255, 0.85); 
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 40px;
            border: 1px solid #d4af37;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            max-width: 90% ;
            width: 600px;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 6vw, 3rem);
            letter-spacing: 0.2em;
            margin: 0;
            color: #111;
        }

        .breed-title {
            font-size: 1rem;
            color: #b8860b;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin: 10px 0 20px 0;
        }

        .gold-divider {
            width: 50px;
            height: 1px;
            background-color: #d4af37;
            margin: 20px auto;
        }

        .legend-motto {
            font-size: 0.9rem;
            color: #333;
            margin: 5px 0;
            line-height: 1.5;
        }

        .hero-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .hero-nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .hero-nav a:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .about-section {
            padding: 80px 20px;
            background-color: #fffdfa;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="hero-overlay">
            <h1 class="brand-name">SKY LOCKER</h1>
            <p class="breed-title">Chow Chow</p>
            <div class="gold-divider"></div>
            <p class="legend-motto">Легенда, коснувшаяся неба</p>
            <p class="legend-motto">A legend that touched the sky</p>
            <p class="legend-motto">触碰天空的传奇</p>
            <nav class="hero-nav">
                <a href="#">Main</a>
                <a href="#about">About</a>
                <a href="#">Dogs</a>
                <a href="#">Puppies</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <section id="about" class="about-section">
        <h2>О нашем питомнике</h2>
        <p>Если вы видите этот текст, значит структура сайта работает исправно.</p>
    </section>

</body>
</html>
