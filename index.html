<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY LOCKER — Premium Chow Chow Kennel</title>
    
    <style>
        /* Сброс отступов для правильного растягивания */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        /* 1. НАДЕЖНЫЙ КОНТЕЙНЕР ДЛЯ ФОНА */
        .hero-bg {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Убрано слово fixed, чтобы не ломать браузеры на телефонах */
            background: url('bg-hero.jpg') no-repeat center center;
            background-size: cover;
            font-family: "Georgia", "Times New Roman", serif;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 2. ТЕКСТОВЫЙ БЛОК (Стеклянная подложка) */
        .content-overlay {
            background: rgba(255, 253, 250, 0.2); /* Легкая дымка */
            backdrop-filter: blur(6px); /* Умеренное размытие */
            -webkit-backdrop-filter: blur(6px); /* Поддержка для iPhone/Safari */
            padding: 40px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            text-align: center;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); /* Легкая тень от блока */
        }

        /* 3. СТИЛИ ТЕКСТА */
        .brand-name {
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 0;
            color: #111;
            /* Белое свечение вокруг букв для контраста */
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.9);
        }

        .breed-name {
            font-size: 1.2rem;
            color: #b8860b;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin: 10px 0 30px 0;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        }

        .gold-divider {
            width: 50px;
            height: 2px;
            background-color: #b8860b;
            margin: 0 auto 30px auto;
        }

        .legend-text {
            margin: 12px 0;
            font-style: italic;
            font-size: 1.1rem;
            color: #111;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.6);
        }

        .legend-cn {
            font-style: normal;
            font-size: 1.35rem;
            color: #000;
            margin-top: 25px;
            letter-spacing: 0.1em;
            font-family: "STSong", "SimSun", "Songti SC", serif;
            font-weight: bold;
        }

        /* 4. НАВИГАЦИЯ */
        nav {
            margin-top: 40px;
        }

        nav a {
            display: inline-block;
            text-decoration: none;
            color: #111;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 10px 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #b8860b;
        }

        /* 5. АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 600px) {
            .content-overlay {
                background: rgba(255, 253, 250, 0.35); /* На телефоне фон чуть плотнее, чтобы текст не сливался с небом */
                padding: 30px 15px;
            }
            nav a { 
                display: block; 
                margin: 15px 0; 
            }
        }
    </style>
</head>
<body>
    
    <div class="hero-bg">
        
        <div class="content-overlay">
            <h1 class="brand-name">SKY LOCKER</h1>
            <p class="breed-name">Chow Chow</p>
            
            <div class="gold-divider"></div>

            <div class="legend-box">
                <p class="legend-text">Легенда, коснувшаяся неба: Древние стражи с лазурным сердцем.</p>
                <p class="legend-text">A legend that touched the sky: Ancient guardians with an azure heart.</p>
                <p class="legend-cn">触碰天空的传奇：拥有蔚蓝之心的远古守护者。</p>
            </div>

            <nav>
                <a href="#">Main</a>
                <a href="#">About</a>
                <a href="#">Our Dogs</a>
                <a href="#">Puppies</a>
                <a href="#">Contact</a>
            </nav>
        </div>

    </div>

</body>
</html>
