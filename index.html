<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY LOCKER - Premium Chow Chow Kennel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    
    <style>
        /* СБРОС СТИЛЕЙ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            /* Использование min-height: 100% более надежно, чем фиксированная высота */
            min-height: 100%;
            background-color: #fffdfa; /* Кремовый фон для всего сайта */
            /* Основной шрифт сайта (более читаемый, чем стандартный) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* 1. БЛОК HERO (Верхний экран с фоном) */
        .hero-section {
            position: relative;
            width: 100%;
            /* Использование vh для фонового изображения на весь экран */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            
            /* --- ИНТЕГРАЦИЯ ВАШЕГО ФОТО --- */
            /* Назовите фото hero-bg.png. PNG гарантирует резкость золотых линий. */
            background-image: url('hero-bg.png'); 
            background-size: cover; /* Изображение растягивается, заполняя пространство */
            background-position: center; /* Центр фото всегда в центре экрана */
            background-repeat: no-repeat;
        }

        /* ТЕКСТОВЫЙ ОВЕРЛЕЙ (Полупрозрачная подложка) */
        .hero-overlay {
            position: relative;
            z-index: 2;
            background: rgba(255, 253, 250, 0.7); /* Кремовый фон с 70% прозрачности */
            
            /* ИСПРАВЛЕНИЕ: Добавлены префиксы для совместимости с Safari/iPhone */
            -webkit-backdrop-filter: blur(8px); /* Для старых версий Safari */
            backdrop-filter: blur(8px); /* Легкое размытие фона для стиля 'люкс' */
            
            padding: 50px 70px;
            border: 2px solid rgba(184, 134, 11, 0.3); /* Тонкая золотая кайма */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 850px;
            box-sizing: border-box; /* Гарантирует, что отступы не увеличивают размер блока */
        }

        /* СТИЛИЗАЦИЯ ТЕКСТА */
        .brand-name {
            /* ИСПРАВЛЕНИЕ: Гарантированное применение шрифта Cinzel */
            font-family: 'Cinzel', serif; 
            font-size: clamp(2rem, 8vw, 3.8rem); /* Адаптивный размер шрифта */
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin: 0;
            color: #111;
            line-height: 1.2;
        }

        .breed-title {
            /* ИСПРАВЛЕНИЕ: Гарантированное применение шрифта Playfair Display */
            font-family: 'Playfair Display', serif; 
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-style: italic;
            color: #b8860b; /* Золотой цвет, подходящий к эмблеме */
            text-transform: uppercase;
            letter-spacing: 0.6em;
            margin: 15px 0 35px 0;
            font-weight: 500;
        }

        .gold-divider {
            width: 70px;
            height: 1px;
            background-color: #d4af37; /* Классический золотой */
            margin: 0 auto 35px auto;
        }

        .legend-motto {
            /* ИСПРАВЛЕНИЕ: Применение шрифта Playfair Display для русского/китайского */
            font-family: 'Playfair Display', serif; 
            font-size: 1rem;
            color: #444;
            line-height: 1.8;
            margin: 12px 0;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* НАВИГАЦИЯ */
        .hero-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 45px;
            border-top: 1px solid rgba(184, 134, 11, 0.2);
            padding-top: 25px;
        }
        .hero-nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: bold;
            transition: color 0.3s ease, border-bottom 0.3s ease;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }
        .hero-nav a:hover {
            color: #d4af37; /* Золотой при наведении */
            border-bottom: 2px solid #d4af37; /* Элегантная золотая линия при наведении */
        }

        /* 2. БЛОК О НАС (Для демонстрации скролла) */
        .about-section {
            padding: 100px 20px;
            background-color: #ffffff;
            text-align: center;
            color: #333;
        }
        .about-content {
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.15rem;
            line-height: 1.9;
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ (ИСПРАВЛЕНИЯ) */
        @media (max-width: 768px) {
            .hero-section {
                /* ИСПРАВЛЕНИЕ: Высота на телефоне более надежная */
                height: 100%;
                min-height: 100vh;
                padding: 40px 15px; /* Увеличены отступы, чтобы блок не при
